# EXAMPLE secret — DO NOT use these values in production. In a real cluster,
# create this with `kubectl create secret` or an external secrets operator, and
# never commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: edgecache-secrets
  namespace: edgecache
type: Opaque
stringData:
  # Control-plane admin API key (Bearer token).
  ADMIN_API_KEY: "dev-admin-key"
  # Postgres connection string used by control-plane and analytics-consumer.
  DATABASE_URL: "postgres://edgecache:edgecache@postgres:5432/edgecache"
  # Redis connection string used by the control-plane.
  REDIS_URL: "redis://redis:6379"
