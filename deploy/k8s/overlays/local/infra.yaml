# Dev-only infrastructure for a self-contained kind/minikube demo. NOT for
# production — no persistence, single replicas. In production, install
# Redis/Postgres/Kafka via their official Helm charts (Bitnami/Strimzi) with
# PersistentVolumeClaims instead of these.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: edgecache
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports: [{ containerPort: 6379 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis, namespace: edgecache }
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: edgecache
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: edgecache }
            - { name: POSTGRES_PASSWORD, value: edgecache }
            - { name: POSTGRES_DB, value: edgecache }
          ports: [{ containerPort: 5432 }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: edgecache }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: edgecache
spec:
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          # Official Apache image (KRaft); replaces the retired bitnami/kafka
          # tags. Env vars drop Bitnami's "_CFG_" prefix.
          image: apache/kafka:3.7.0
          env:
            - { name: KAFKA_NODE_ID, value: "0" }
            - { name: KAFKA_PROCESS_ROLES, value: "controller,broker" }
            # Single combined broker+controller in one pod: the controller quorum
            # is reachable on localhost. (The `kafka` Service only forwards 9092,
            # so `kafka:9093` would be unroutable — unlike compose networking.)
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "0@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
          ports: [{ containerPort: 9092 }]
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: edgecache }
spec:
  selector: { app: kafka }
  ports: [{ port: 9092, targetPort: 9092 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-origin
  namespace: edgecache
spec:
  replicas: 1
  selector: { matchLabels: { app: dummy-origin } }
  template:
    metadata: { labels: { app: dummy-origin } }
    spec:
      containers:
        - name: dummy-origin
          image: edgecache-dummy-origin:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
---
apiVersion: v1
kind: Service
metadata: { name: dummy-origin, namespace: edgecache }
spec:
  selector: { app: dummy-origin }
  ports: [{ port: 8081, targetPort: 8081 }]
