global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: edgecache-proxy
    metrics_path: /metrics
    static_configs:
      # Container-internal metrics port is 9100 on every replica.
      - targets:
          - proxy1:9100
          - proxy2:9100
          - proxy3:9100
        labels:
          service: edgecache-proxy
