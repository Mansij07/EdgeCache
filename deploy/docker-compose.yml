# EdgeCache full local stack.
#   docker compose up --build
#
# Client-facing proxy replicas (hit any of them):
#   proxy1 -> http://localhost:8080   proxy2 -> http://localhost:8082   proxy3 -> http://localhost:8083
# Control plane admin API:  http://localhost:9000
# Prometheus: http://localhost:9090   Grafana: http://localhost:3000 (admin/admin)

x-proxy-base: &proxy-base
  build:
    context: ../proxy
    args:
      ENABLE_KAFKA: "ON"
  image: edgecache-proxy:local
  depends_on:
    redis:
      condition: service_healthy
    dummy-origin:
      condition: service_healthy
  environment: &proxy-env
    EDGECACHE_LISTEN_PORT: "8080"
    EDGECACHE_METRICS_PORT: "9100"
    EDGECACHE_WORKERS: "2"
    EDGECACHE_MAX_CACHE_BYTES: "134217728" # 128 MiB
    EDGECACHE_DEFAULT_TTL_SECONDS: "60"
    EDGECACHE_ORIGIN_HOST: "dummy-origin"
    EDGECACHE_ORIGIN_PORT: "8081"
    EDGECACHE_REDIS_HOST: "redis"
    EDGECACHE_REDIS_PORT: "6379"
    EDGECACHE_L2_ENABLED: "ON" # shared Redis L2 tier
    EDGECACHE_KAFKA_BROKERS: "kafka:9092"
    EDGECACHE_KAFKA_TOPIC: "edgecache.access-log"
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edgecache
      POSTGRES_PASSWORD: edgecache
      POSTGRES_DB: edgecache
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgecache"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Official Apache image (KRaft, single-node). Replaces the retired
    # bitnami/kafka tags; note the env vars drop Bitnami's "_CFG_" prefix.
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: "0"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  dummy-origin:
    build:
      context: ../dummy-origin
    image: edgecache-dummy-origin:local
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  control-plane:
    build:
      context: ../control-plane
    image: edgecache-control-plane:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "9000"
      DATABASE_URL: "postgres://edgecache:edgecache@postgres:5432/edgecache"
      REDIS_URL: "redis://redis:6379"
      ADMIN_API_KEY: "dev-admin-key"
    ports:
      - "9000:9000"
    restart: unless-stopped

  analytics-consumer:
    build:
      context: ../analytics-consumer
    image: edgecache-analytics-consumer:local
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: "edgecache.access-log"
      KAFKA_GROUP_ID: "edgecache-analytics"
      DATABASE_URL: "postgres://edgecache:edgecache@postgres:5432/edgecache"
    restart: unless-stopped

  proxy1:
    <<: *proxy-base
    environment:
      <<: *proxy-env
      EDGECACHE_REPLICA_ID: "proxy1"
    ports:
      - "8080:8080"
      - "9101:9100"

  proxy2:
    <<: *proxy-base
    environment:
      <<: *proxy-env
      EDGECACHE_REPLICA_ID: "proxy2"
    ports:
      - "8082:8080"
      - "9102:9100"

  proxy3:
    <<: *proxy-base
    environment:
      <<: *proxy-env
      EDGECACHE_REPLICA_ID: "proxy3"
    ports:
      - "8083:8080"
      - "9103:9100"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      # Host 3001 avoids clashing with other local stacks that use 3000.
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
