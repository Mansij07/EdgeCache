apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The EdgeCache application components. Stateful infra (Redis/Postgres/Kafka) is
# NOT here — install it via Helm charts (see k8s README) or the local overlay for
# a self-contained kind/minikube demo.
resources:
  - namespace.yaml
  - proxy-configmap.yaml
  - secrets.example.yaml
  - proxy-deployment.yaml
  - proxy-service.yaml
  - proxy-hpa.yaml
  - control-plane.yaml
  - analytics-consumer.yaml
  - ingress.yaml
  - network-policy.yaml
